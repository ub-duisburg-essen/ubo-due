######################################################################
#                                                                    #
#                          ORCID Integration                         #
#                                                                    #
######################################################################

# To use the ORCID Sandbox API and UI, set this property to "sandbox." (with dot at the end).
# For production API and UI, set it to an empty string:
# UBO.ORCID2.SandboxPrefix=sandbox.
UBO.ORCID2.SandboxPrefix=

# Base URL of ORCID API
MCR.ORCID2.BaseURL=https\://%UBO.ORCID2.SandboxPrefix%orcid.org/

# URL to link ORCID iDs to
MCR.ORCID2.LinkURL=https\://%UBO.ORCID2.SandboxPrefix%orcid.org/

MCR.ORCID2.Client.V3.PublicAPI=https\://pub.%UBO.ORCID2.SandboxPrefix%orcid.org/v3.0
MCR.ORCID2.Client.V3.MemberAPI=https\://api.%UBO.ORCID2.SandboxPrefix%orcid.org/v3.0

# Set in local mycore.properties: 
# Use member API if institution has membership with ORCID, 
# otherwise use public API (both either sandbox or production)
# MCR.ORCID2.Client.V3.APIMode=member

# Set in local mycore.properties: Client ID and secret for ORCID API
# MCR.ORCID2.OAuth.ClientID=
# MCR.ORCID2.OAuth.ClientSecret=

# Ask user for permission to read limited data and update activities (works)
MCR.ORCID2.OAuth.Scope=/read-limited /activities/update

# Link to local webpage with ORCID howto infos
UBO.ORCID2.InfoURL=https://www.uni-due.de/ub/publikationsdienste/orcid.php

# Only confirmed publications should be synced to user's ORCID profile
MCR.ORCID2.Work.PublishStates=confirmed

# Trusted name identifier types for matching ORCID works
MCR.ORCID2.User.TrustedNameIdentifierTypes=orcid,gnd,lsf

# Activate event handler for syncing works to ORCID when they are updated in MyCoRe.
# Activate in local mycore.properties. Requires ORCID credentials and API config.
# MCR.EventHandler.MCRObject.018A.Class=org.mycore.orcid2.v3.work.MCRORCIDWorkEventHandlerImpl

# New publication in UBO will be written to ORCID profile. 
MCR.ORCID2.WorkEventHandler.CreateFirstWork=true

# Updates of publication data in UBO will be synced to ORCID profile.
MCR.ORCID2.WorkEventHandler.AlwaysUpdateWork=true

# If the publication already exists in ORCID profile, date from UBO will be added to the existing work as duplicate entry.
MCR.ORCID2.WorkEventHandler.CreateDuplicateWork=true

# If the publication is deleted in ORCID profile, it will not be recreated by UBO
MCR.ORCID2.WorkEventHandler.RecreateDeletedWork=false

